# Section 5 — Automated LLM Code Review
#
# Trigger: any PR targeting main is opened, updated, or reopened.
#
# Mechanism: installs GitHub Copilot CLI on the runner, passes the PR diff
# as a prompt, writes the review to a file, then posts it as a PR comment.
#
# Available on: ALL GitHub Copilot plans (same as workflow 02).
#
# Required secrets:
#   COPILOT_TOKEN — same PAT used by all other workflows
#     (Account: Copilot Requests r/w  |  Repo: Contents r, Pull requests r/w, Metadata r)
#
# The built-in GITHUB_TOKEN is sufficient for posting the PR comment.

name: "S5 · LLM Code Review (Copilot CLI)"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Fetch the PR diff (cap at ~15 000 chars) ───────────────────────
      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RAW=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" 2>/dev/null || true)
          CHARS=${#RAW}
          DIFF="${RAW:0:15000}"
          [ "$CHARS" -gt 15000 ] && DIFF+="
          ... [diff truncated — ${CHARS} chars total]"
          printf '%s' "$DIFF" > /tmp/pr.diff
          echo "Diff: ${CHARS} chars"

      # ── 3. Set up Node.js and install Copilot CLI ─────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      # ── 4. Run Copilot CLI to produce a review ────────────────────────────
      - name: Generate review with Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cat > /tmp/review-prompt.txt << 'PROMPT_EOF'
          You are a senior engineer reviewing a pull request for DocSeek,
          a UPMC physician-matching web application.

          Stack: React 19 + Vite + TypeScript (client/src/), Bun + Hono REST API (api/src/),
          PostgreSQL + pgvector, OpenAI for embeddings and chat completions, Tailwind CSS v4.
          Frontend tests: Vitest. Backend tests: Bun test.

          Review the diff below and write your review to the file /tmp/review.md.

          The review must use exactly this markdown structure:

          ## Summary
          One paragraph: what does this PR do and is it well-scoped?

          ## Issues
          List each issue as a bullet with a severity icon:
            🔴 Critical  — data loss, security hole, broken build (must fix before merge)
            🟡 Major     — logic bug, missing error handling, broken API contract
            🔵 Minor     — naming, style, small inefficiency
          If none: write exactly "_No issues found._"

          ## Test coverage
          Are all acceptance criteria tested? What is missing?

          ## Security
          Any SQL injection, XSS, exposed secret, unsafe CORS, or unauthenticated write endpoint?
          If none: write exactly "_No security concerns._"

          ## Recommendation
          End with exactly one of these lines:
          ✅ **Approve**
          🟡 **Approve with minor fixes**
          🔴 **Request changes**

          Here is the diff to review:
          PROMPT_EOF

          # Append diff to prompt
          cat /tmp/pr.diff >> /tmp/review-prompt.txt
          echo "" >> /tmp/review-prompt.txt
          echo "Write your complete review to /tmp/review.md now." >> /tmp/review-prompt.txt

          copilot -p "$(cat /tmp/review-prompt.txt)" \
            --allow-tool=write \
            --no-ask-user

      # ── 5. Post review as a PR comment ────────────────────────────────────
      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/review.md ]; then
            echo "WARNING: Copilot did not write /tmp/review.md"
            echo "⚠️ Automated review did not produce output. Check the workflow logs." \
              > /tmp/review.md
          fi

          REVIEW=$(cat /tmp/review.md)

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "## 🤖 Automated Code Review — GitHub Copilot

          ${REVIEW}

          ---
          *Generated by \`.github/workflows/03-llm-code-review.yml\`.
          Advisory only — a human reviewer must still approve before merge.*"
