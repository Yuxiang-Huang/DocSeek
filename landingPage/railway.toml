# Deploy with Railway → Settings → Root Directory = `landingPage` (monorepo).
# If the service root must stay the repo root, use `/railway.landing.toml` at the repo root instead.
# Dockerfile: Node 22 + full `npm ci` so Vite 7 and Tailwind Oxide optional natives install on Linux.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Matches Dockerfile runner (no package.json in final image).
startCommand = "node scripts/railway-serve.mjs"
healthcheckPath = "/"
healthcheckTimeout = 120
